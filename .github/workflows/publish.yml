name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string
      maintenance_action:
        description: Optional npm maintenance action instead of publishing
        required: false
        default: publish
        type: choice
        options:
          - publish
          - deprecate-effect-db-beta66
          - remove-effect-db-beta-tag

concurrency:
  group: publish-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    env:
      NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Determine release tag
        id: tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          git fetch --tags --force
          TAG="$RELEASE_TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        run: git checkout --detach "${{ steps.tag.outputs.tag }}"

      - name: Extract release notes
        id: notes
        run: |
          TAG_VERSION="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG_VERSION#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## " version " - " { capture=1; print; next }
            capture && $0 ~ "^## " { exit }
            capture { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          if [ ! -s "$RUNNER_TEMP/release-notes.md" ]; then
            echo "Missing release notes for ${TAG_VERSION}" >&2
            exit 1
          fi
          echo "notes=$RUNNER_TEMP/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          VERSION="${VERSION#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure npm auth
        run: printf "//registry.npmjs.org/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > "$HOME/.npmrc"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish querybuilder to npm
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.maintenance_action == 'publish' }}
        working-directory: packages/querybuilder
        run: bunx npm publish --access public --tag "${{ steps.npm-tag.outputs.tag }}"

      - name: Publish database to npm
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.maintenance_action == 'publish' }}
        working-directory: packages/database
        run: bun publish --access public --tag "${{ steps.npm-tag.outputs.tag }}"

      - name: Deprecate broken beta database package
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.maintenance_action == 'deprecate-effect-db-beta66' }}
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          VERSION="${VERSION#v}"
          npm deprecate "effect-db@${VERSION}" "Broken generated type declaration: import { defineConfig } from 'effect-db' fails with TS2305. Use effect-qb@4.0.0-beta.66 only, or wait for the next effect-db beta."

      - name: Remove broken database beta tag
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.maintenance_action == 'remove-effect-db-beta-tag' }}
        run: npm dist-tag rm effect-db beta

      - name: Create GitHub release
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.maintenance_action == 'publish' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.tag.outputs.tag }}" --notes-file "${{ steps.notes.outputs.notes }}" --title "${{ steps.tag.outputs.tag }}"
