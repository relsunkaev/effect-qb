name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish
        required: true
        type: string

concurrency:
  group: publish-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Determine release tag
        id: tag
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          git fetch --tags --force
          TAG="$RELEASE_TAG"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag
        run: git checkout --detach "${{ steps.tag.outputs.tag }}"

      - name: Extract release notes
        id: notes
        run: |
          TAG_VERSION="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG_VERSION#v}"
          awk -v version="$VERSION" '
            $0 ~ "^## " version " - " { capture=1; print; next }
            capture && $0 ~ "^## " { exit }
            capture { print }
          ' CHANGELOG.md > "$RUNNER_TEMP/release-notes.md"
          if [ ! -s "$RUNNER_TEMP/release-notes.md" ]; then
            echo "Missing release notes for ${TAG_VERSION}" >&2
            exit 1
          fi
          echo "notes=$RUNNER_TEMP/release-notes.md" >> "$GITHUB_OUTPUT"

      - name: Determine npm tag
        id: npm-tag
        run: |
          VERSION="${{ steps.tag.outputs.tag }}"
          VERSION="${VERSION#v}"
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=beta" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish packages to npm
        run: |
          publish_package() {
            local package_dir="$1"
            local package_name
            local package_version
            local archive
            local archive_shasum
            local published_shasum

            package_name="$(bun -e 'const value = await Bun.file(Bun.argv[1]).json(); console.log(value.name)' "$package_dir/package.json")"
            package_version="$(bun -e 'const value = await Bun.file(Bun.argv[1]).json(); console.log(value.version)' "$package_dir/package.json")"
            archive="$RUNNER_TEMP/${package_name}-${package_version}.tgz"

            (cd "$package_dir" && bun pm pack --filename "$archive" --quiet)
            archive_shasum="$(sha1sum "$archive" | awk '{print $1}')"

            if published_shasum="$(npm view "$package_name@$package_version" dist.shasum 2>/dev/null)"; then
              if [ "$published_shasum" != "$archive_shasum" ]; then
                echo "::error::$package_name@$package_version already exists with different contents"
                exit 1
              fi

              echo "$package_name@$package_version is already published with matching contents"
              return
            fi

            npm publish "$archive" --access public --tag "${{ steps.npm-tag.outputs.tag }}"
          }

          publish_package packages/querybuilder
          publish_package packages/database

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if [[ "${{ steps.npm-tag.outputs.tag }}" == "latest" ]]; then
            RELEASE_KIND=(--prerelease=false --latest)
          else
            RELEASE_KIND=(--prerelease)
          fi
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" "${RELEASE_KIND[@]}" --notes-file "${{ steps.notes.outputs.notes }}" --title "$TAG"
          else
            gh release create "$TAG" "${RELEASE_KIND[@]}" --verify-tag --notes-file "${{ steps.notes.outputs.notes }}" --title "$TAG"
          fi
          if [[ "${{ steps.npm-tag.outputs.tag }}" != "latest" ]]; then
            RELEASE_ID="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$TAG" --jq .id)"
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/releases/$RELEASE_ID" -f make_latest=false >/dev/null
          fi
