name: Publish

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.event.workflow_run.head_sha || github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
          cache: true

      - name: Determine release tag
        id: tag
        run: |
          git fetch --tags --force
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            TAG="$(git describe --tags --abbrev=0 --match 'v[0-9]*')"
          else
            TAG="$GITHUB_REF_NAME"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        env:
          EVENT_NAME: ${{ github.event_name }}

      - name: Checkout release tag
        run: git checkout --detach "${{ steps.tag.outputs.tag }}"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Configure npm auth
        run: printf "//registry.npmjs.org/:_authToken=%s\n" "$NODE_AUTH_TOKEN" > "$HOME/.npmrc"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        run: bun publish --access public

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ steps.tag.outputs.tag }}" --generate-notes --title "${{ steps.tag.outputs.tag }}"
